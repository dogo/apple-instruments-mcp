name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Pyright
        run: pyright

      - name: Unit tests
        run: python -m unittest discover -s tests -v

  macos-xctrace-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Verify xctrace integration
        run: |
          python - <<'PY'
          import asyncio
          from apple_instruments_mcp.analysis import run_command

          output = asyncio.run(
              run_command("xcrun", "xctrace", "version", timeout=15)
          )
          assert "xctrace version" in output.lower(), output
          print(output.strip())
          PY
